<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anda Sedang Offline</title>
    <style>
        /* Pengaturan Dasar dan Font Sistem */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        /* Kontainer Utama */
        .container {
            max-width: 500px;
            padding: 20px;
            margin: 20px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        /* Styling Ikon */
        .icon-container {
            margin-bottom: 20px;
            /* Animasi untuk ikon */
            animation: float 3s ease-in-out infinite;
        }

        .icon-container svg {
            width: 80px;
            height: 80px;
            color: #007bff;
        }

        /* Styling Teks */
        h1 {
            font-size: 2em; /* 2 kali ukuran font dasar */
            margin-top: 0;
            margin-bottom: 10px;
            color: #1c1c1e;
        }

        p {
            font-size: 1.1em;
            line-height: 1.6;
            color: #6c757d;
            margin: 0;
        }

        /* Keyframes untuk Animasi Mengambang */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-wifi-off">
                <line x1="1" y1="1" x2="23" y2="23"></line>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                <line x1="12" y1="20" x2="12.01" y2="20"></line>
            </svg>
        </div>
        <h1>Koneksi Terputus</h1>
        <p>Maaf, sepertinya perangkat Anda tidak terhubung ke internet. Silakan periksa kembali koneksi Anda dan coba lagi.</p>
    </div>
</body>
</html>
